<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="每日更新的出海品牌深度案例库">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%23111111%22/><path d=%22M18 16h18c9 0 14 4 14 11 0 5-3 8-7 9 5 1 8 5 8 10 0 8-6 12-15 12H18V16zm10 9v8h7c4 0 6-1 6-4s-2-4-6-4h-7zm0 16v8h8c4 0 6-1 6-4s-2-4-6-4h-8z%22 fill=%22white%22/></svg>">
  <title>出海品牌案例库</title>
  <style>
    :root{--ink:#161616;--muted:#6c6c68;--line:#d9d9d3;--paper:#f4f3ee;--white:#fff;--red:#e7442e;--shadow:0 12px 30px rgba(22,22,22,.08)}
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,"PingFang SC","Microsoft YaHei",sans-serif;letter-spacing:0}
    button,input{font:inherit}
    a{color:inherit}
    .topbar{height:68px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 max(24px,calc((100vw - 1180px)/2));background:rgba(244,243,238,.94);position:sticky;top:0;z-index:10;backdrop-filter:blur(14px)}
    .brandmark{display:flex;align-items:center;gap:12px;font-weight:800;text-decoration:none}
    .mark{width:32px;height:32px;background:var(--ink);color:#fff;display:grid;place-items:center;font-family:Georgia,serif;font-size:18px}
    .top-meta{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:10px}
    .pulse{width:7px;height:7px;border-radius:50%;background:#22a06b;box-shadow:0 0 0 5px rgba(34,160,107,.1)}
    main{max-width:1180px;margin:auto;padding:56px 24px 80px}
    .intro{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(260px,.65fr);gap:54px;align-items:end;border-bottom:1px solid var(--ink);padding-bottom:42px}
    .kicker{font-size:12px;font-weight:800;text-transform:uppercase;color:var(--red);margin-bottom:18px}
    h1{font-family:Georgia,"Songti SC",serif;font-size:clamp(44px,7vw,86px);line-height:.98;margin:0;letter-spacing:0;font-weight:600;max-width:820px}
    .lede{font-size:16px;line-height:1.8;color:var(--muted);margin:0 0 4px}
    .edition{margin-top:22px;font-size:13px;font-weight:700}
    .latest{display:grid;grid-template-columns:1.15fr .85fr;background:var(--ink);color:#fff;margin:34px 0 48px;min-height:360px;overflow:hidden}
    .latest-copy{padding:48px;display:flex;flex-direction:column;justify-content:space-between}
    .latest-label{font-size:12px;color:#ff9c83;font-weight:800}
    .latest h2{font-family:Georgia,"Songti SC",serif;font-size:clamp(36px,5vw,62px);line-height:1;margin:18px 0 20px;letter-spacing:0}
    .latest-summary{font-size:16px;line-height:1.75;color:#c9c9c4;max-width:620px}
    .read-link{display:inline-flex;align-items:center;gap:12px;color:#fff;text-decoration:none;font-weight:700;margin-top:28px}
    .arrow{width:34px;height:34px;border:1px solid #777;display:grid;place-items:center;transition:.2s}
    .read-link:hover .arrow{background:#fff;color:#111;border-color:#fff;transform:translateX(4px)}
    .latest-art{position:relative;background:#ddd;min-height:300px;overflow:hidden}
    .latest-art img{width:100%;height:100%;object-fit:contain;padding:35px;position:relative;z-index:2}
    .art-word{position:absolute;inset:0;display:grid;place-items:center;font-family:Georgia,serif;font-size:clamp(90px,15vw,210px);color:rgba(255,255,255,.42);font-weight:700}
    .toolbar{display:flex;align-items:center;gap:14px;margin-bottom:24px}
    .search{position:relative;flex:1}
    .search input{width:100%;height:48px;border:1px solid var(--line);background:#fff;padding:0 46px 0 16px;border-radius:0;outline:none}
    .search input:focus{border-color:var(--ink)}
    .search-icon{position:absolute;right:15px;top:14px;color:var(--muted);font-size:18px}
    .filters{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px}
    .filter{border:1px solid var(--line);height:48px;background:transparent;padding:0 17px;white-space:nowrap;cursor:pointer}
    .filter.active,.filter:hover{background:var(--ink);border-color:var(--ink);color:#fff}
    .section-head{display:flex;justify-content:space-between;align-items:end;margin:44px 0 20px}
    .section-head h2{font-size:25px;margin:0;letter-spacing:0}
    .result-count{font-size:13px;color:var(--muted)}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .case{background:#fff;border:1px solid var(--line);display:flex;flex-direction:column;min-height:390px;transition:.2s;position:relative}
    .case:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:#aaa}
    .case-top{height:122px;padding:19px;display:flex;justify-content:space-between;position:relative;overflow:hidden}
    .case-date{font-size:12px;font-weight:800;position:relative;z-index:2}
    .case-letter{font-family:Georgia,serif;font-size:110px;line-height:.7;color:rgba(255,255,255,.46);position:absolute;right:10px;bottom:-5px}
    .case-body{padding:23px 22px 20px;display:flex;flex-direction:column;flex:1}
    .case-category{font-size:12px;color:var(--muted);font-weight:700}
    .case h3{font-family:Georgia,"Songti SC",serif;font-size:27px;line-height:1.08;margin:10px 0 15px;letter-spacing:0}
    .case-summary{font-size:14px;line-height:1.75;color:#555;margin:0 0 18px;flex:1}
    .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px}
    .tag{font-size:11px;border:1px solid var(--line);padding:5px 7px;color:#555}
    .case-link{border-top:1px solid var(--line);padding-top:15px;text-decoration:none;font-size:13px;font-weight:800;display:flex;justify-content:space-between}
    .empty{display:none;padding:80px 20px;text-align:center;color:var(--muted);border:1px dashed var(--line)}
    footer{border-top:1px solid var(--line);padding:28px max(24px,calc((100vw - 1180px)/2));display:flex;justify-content:space-between;color:var(--muted);font-size:12px}
    @media(max-width:860px){.intro{grid-template-columns:1fr;gap:20px}.latest{grid-template-columns:1fr}.latest-art{min-height:260px;order:-1}.latest-copy{padding:34px}.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.toolbar{align-items:stretch;flex-direction:column}.filters{width:100%}.filter{height:42px}}
    @media(max-width:560px){.topbar{height:58px;padding:0 16px}.top-meta span:last-child{display:none}main{padding:36px 16px 60px}h1{font-size:48px}.intro{padding-bottom:28px}.latest{margin:24px 0 36px}.latest-copy{padding:28px 24px}.latest-art{min-height:220px}.latest-art img{padding:24px}.grid{grid-template-columns:1fr}.case{min-height:340px}.section-head{margin-top:34px}footer{padding:22px 16px;gap:12px;flex-direction:column}}
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brandmark" href="#"><span class="mark">B</span><span>出海品牌案例库</span></a>
    <div class="top-meta"><span class="pulse"></span><span>每日更新 · 10:00</span></div>
  </header>
  <main>
    <section class="intro">
      <div><div class="kicker">Daily Brand Intelligence</div><h1>看懂一个品牌，带走一套打法。</h1></div>
      <div><p class="lede">每天拆解一个值得学习的出海品牌。快速读结论，深入看动作，随时回找过去的案例。</p><div class="edition" id="edition"></div></div>
    </section>
    <section class="latest" id="latest"></section>
    <div class="toolbar">
      <label class="search"><input id="search" type="search" placeholder="搜索品牌、品类或打法" aria-label="搜索案例"><span class="search-icon">⌕</span></label>
      <div class="filters" id="filters" aria-label="案例筛选"></div>
    </div>
    <div class="section-head"><h2>全部案例</h2><span class="result-count" id="count"></span></div>
    <section class="grid" id="grid"></section>
    <div class="empty" id="empty">没有找到匹配的案例，换个关键词试试。</div>
  </main>
  <footer><span>出海品牌案例库</span><span>资料来自公开来源，仅供研究与学习</span></footer>
  <script>
    const dataScript = document.createElement("script");
    dataScript.src = `cases.js?v=${Date.now()}`;
    dataScript.onload = init;
    dataScript.onerror = () => {
      document.querySelector("#empty").textContent = "案例数据加载失败，请稍后刷新重试。";
      document.querySelector("#empty").style.display = "block";
    };
    document.head.appendChild(dataScript);

    function init() {
    const cases = [...window.BRAND_CASES].sort((a,b) => b.date.localeCompare(a.date));
    const $ = s => document.querySelector(s);
    const fmt = d => new Intl.DateTimeFormat("zh-CN",{year:"numeric",month:"long",day:"numeric"}).format(new Date(d+"T00:00:00"));
    const esc = s => String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
    let active = "全部";
    $("#edition").textContent = `${cases.length} 个案例 · 最近更新 ${fmt(cases[0].date)}`;
    const latest = cases[0];
    $("#latest").innerHTML = `
      <div class="latest-copy"><div><div class="latest-label">今日新案例 · ${fmt(latest.date)}</div><h2>${esc(latest.brand)}</h2><p class="latest-summary">${esc(latest.summary)}</p></div>
      <a class="read-link" href="${esc(latest.report)}">阅读完整拆解 <span class="arrow">→</span></a></div>
      <div class="latest-art" style="background:${latest.accent}">${latest.cover?`<img src="${esc(latest.cover)}" alt="${esc(latest.brand)} 产品图">`:""}<div class="art-word">${esc(latest.brand.charAt(0))}</div></div>`;
    const categories = ["全部",...new Set(cases.map(x=>x.category))];
    $("#filters").innerHTML = categories.map(x=>`<button class="filter${x==="全部"?" active":""}" data-category="${esc(x)}">${esc(x)}</button>`).join("");
    function render(){
      const q = $("#search").value.trim().toLowerCase();
      const found = cases.filter(x => (active==="全部" || x.category===active) && [x.brand,x.category,x.market,x.summary,x.insight,...x.tags].join(" ").toLowerCase().includes(q));
      $("#count").textContent = `${found.length} / ${cases.length}`;
      $("#grid").innerHTML = found.map(x=>`
        <article class="case">
          <div class="case-top" style="background:${x.accent}"><span class="case-date">${fmt(x.date)}</span><span class="case-letter">${esc(x.brand.charAt(0))}</span></div>
          <div class="case-body"><div class="case-category">${esc(x.category)} · ${esc(x.market)}</div><h3>${esc(x.brand)}</h3>
          <p class="case-summary">${esc(x.summary)}</p><div class="tags">${x.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
          <a class="case-link" href="${esc(x.report)}"><span>查看深度拆解</span><span>→</span></a></div>
        </article>`).join("");
      $("#empty").style.display = found.length ? "none" : "block";
    }
    $("#search").addEventListener("input",render);
    $("#filters").addEventListener("click",e=>{if(!e.target.matches(".filter"))return;active=e.target.dataset.category;document.querySelectorAll(".filter").forEach(b=>b.classList.toggle("active",b===e.target));render()});
    render();
    }
  </script>
</body>
</html>
